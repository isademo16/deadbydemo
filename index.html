<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dead by Demo</title>
    <style>
        *
        {
            font-family: 'Arial Black';
        }
        body
        {
            background-color: #171717;
        }
        header, main
        {
            margin: auto;
            width:30%;
            padding-left: 30px;
        }
        header
        {
            margin-top: 10px;
            color: #9c459c;
            border-left: #9c459c solid 5px;
            padding-left: 30px;
        }
        header input{
            background-color: #171717;
            border: #9c459c solid 5px;
            color: #909090;
            padding: 5px;
            width: 100%;
        }
        main
        {
            border-left: #99d9ea solid 5px;
            color: #7092be;
            margin-top: 70px;
            margin-bottom: 300px;
        }
        h1
        {
            font-size: 70px;
            font-weight: bold;
            text-shadow:  0 3px 0 #5f2f5f;
            margin-bottom: -15px;
        }
        table
        {
            table-layout: fixed;
            width: 100%;
        }
        td
        {
            height: 40px;
            width: 50%;
        }
        div
        {
            overflow-x: auto;
        }
        .lighter
        {
            background-color: #2e2e2e;
        }
        sub
        {
            margin:5px;
        }
        p
        {
            color: gray;
        }
        a:link
        {
            color: #7092be;
        }
        a:visited
        {
            color: #7092be;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 20px;
            align-items: center;
        }
        .pagination button {
            padding: 5px 10px;
            background-color: #9c459c;
            color: white;
            border: none;
            cursor: pointer;
        }
        .pagination button:disabled {
            background-color: #5f2f5f;
            cursor: not-allowed;
        }
        .sortable {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .sortable span {
            font-size: 12px;
            color: #7092be;
        }
        .page-input {
            background-color: #171717;
            color: white;
            border: #9c459c solid 2px;
            width: 50px;
            text-align: center;
        }

        /* Style for the clickable page number */
        .page-number {
            display: inline-block;
            padding: 5px 10px;
            background-color: #2e2e2e;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .page-number:hover {
            background-color: #9c459c;
        }

        .page-number.active {
            background-color: #5f2f5f; /* Dark gray box around the active page number */
            border-radius: 5px;
        }

        .page-number span {
            padding: 2px 5px;
            background-color: #333;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>DEAD <br> BY DEMO</h1>
        <br>
        <input type="text" placeholder="NAME SEARCH..." onkeyup="debouncedSearch()" id="searchbar"/> 
    </header>
    <main>
        <table id="table"></table>
        <div class="pagination" id="pagination"></div>
    </main>
    <script>
        let result;
        var xmlhttp = new XMLHttpRequest();
        xmlhttp.open("GET", "names.txt", false);
        xmlhttp.send();
        if (xmlhttp.status == 200) {
            text = xmlhttp.responseText;
            result = text.split(/\r?\n/);
        }

        let distinct = [];
        let counter = [];
        for (let name of result) {
            if (distinct.indexOf(name) == -1) {
                distinct.push(name);
                counter[distinct.indexOf(name)] = 1;
                continue;
            }
            counter[distinct.indexOf(name)]++;
        }

        const rowsPerPage = 32; // Rows to display per page
        let currentPage = 1; // Current page
        let searchResults = distinct.map((name, index) => ({ name, count: counter[index] })); // Full list
        let filteredResults = [...searchResults]; // Copy of the search results, for filtering
        let sortBySacrificed = false; // Flag to toggle between recent name order and most sacrificed order

        // Debounce function to delay the search
        let debounceTimeout;
        function debouncedSearch() {
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(function() {
                search();
            }, 500); // Delay of 500ms after the user stops typing
        }

        // Display table based on the current page
        function displayTable(page, data) {
            const table = document.getElementById("table");
            table.innerHTML = `
                <tr>
                    <td>Player Name</td>
                    <td>
                        <div class="sortable" onclick="toggleSort()">
                            Times Sacrificed
                            <span>${sortBySacrificed ? "▲▼" : "▼▲"}</span>
                        </div>
                    </td>
                </tr>
            `;

            const start = (page - 1) * rowsPerPage;
            const end = Math.min(start + rowsPerPage, data.length);

            for (let i = start; i < end; i++) {
                const rowClass = i % 2 === 0 ? " class='lighter'" : "";
                table.innerHTML += `<tr${rowClass}><td><div>${data[i].name}</div></td><td><div>${data[i].count}</div></td></tr>`;
            }
            updatePagination(page, data.length);
        }

        // Update the pagination buttons
        function updatePagination(page, totalRows) {
            const pagination = document.getElementById("pagination");
            const totalPages = Math.ceil(totalRows / rowsPerPage);
            pagination.innerHTML = "";

            // Previous 10 Pages Button
            const prev10Button = document.createElement("button");
            prev10Button.textContent = "<< 10";
            prev10Button.disabled = page <= 10;
            prev10Button.onclick = () => changePage(-10);
            pagination.appendChild(prev10Button);

            // Previous Button
            const prevButton = document.createElement("button");
            prevButton.textContent = "< Previous";
            prevButton.disabled = page === 1;
            prevButton.onclick = () => changePage(-1);
            pagination.appendChild(prevButton);

            // Page Number (clickable)
            const pageNumber = document.createElement("span");
            pageNumber.textContent = `${page}`;
            pageNumber.classList.add("page-number");
            if (currentPage === page) {
                pageNumber.classList.add("active"); // Add active class to highlight the current page
            }
            pageNumber.onclick = () => showPageInput(page);
            pagination.appendChild(pageNumber);

            // Total Pages Info
            const totalPagesInfo = document.createElement("span");
            totalPagesInfo.textContent = `of ${totalPages} pages`;
            totalPagesInfo.style.color = "white";
            pagination.appendChild(totalPagesInfo);

            // Page input field (hidden by default)
            const pageInput = document.createElement("input");
            pageInput.type = "number";
            pageInput.value = page;
            pageInput.classList.add("page-input");
            pageInput.style.display = "none";
            pageInput.onblur = () => hidePageInput();
            pageInput.onkeydown = (e) => {
                if (e.key === "Enter") {
                    changePageTo(parseInt(pageInput.value));
                    hidePageInput();
                }
            };
            pagination.appendChild(pageInput);

            // Next Button
            const nextButton = document.createElement("button");
            nextButton.textContent = "Next >";
            nextButton.disabled = page === totalPages;
            nextButton.onclick = () => changePage(1);
            pagination.appendChild(nextButton);

            // Next 10 Pages Button
            const next10Button = document.createElement("button");
            next10Button.textContent = "10 >>";
            next10Button.disabled = page + 10 > totalPages;
            next10Button.onclick = () => changePage(10);
            pagination.appendChild(next10Button);
        }

        // Show page input when page number is clicked
        function showPageInput(page) {
            const pagination = document.getElementById("pagination");
            const pageNumber = pagination.querySelector(".page-number");
            const pageInput = pagination.querySelector("input");
            pageNumber.style.display = "none";
            pageInput.style.display = "inline-block";
            pageInput.focus();
        }

        // Hide the page input field when clicking outside
        function hidePageInput() {
            const pagination = document.getElementById("pagination");
            const pageNumber = pagination.querySelector(".page-number");
            const pageInput = pagination.querySelector("input");
            pageNumber.style.display = "inline-block";
            pageInput.style.display = "none";
        }

        // Change page to the specified number
        function changePageTo(page) {
            const totalPages = Math.ceil(filteredResults.length / rowsPerPage);
            currentPage = Math.max(1, Math.min(page, totalPages));
            displayTable(currentPage, filteredResults);
        }

        // Change page based on button click (1 or 10 pages)
        function changePage(step) {
            const totalPages = Math.ceil(filteredResults.length / rowsPerPage);
            currentPage = Math.max(1, Math.min(currentPage + step, totalPages));
            displayTable(currentPage, filteredResults);
        }

        // Toggle between sorting by "Most Sacrificed" and "Most Recent"
        function toggleSort() {
            sortBySacrificed = !sortBySacrificed;
            
            if (sortBySacrificed) {
                // Sort by most sacrificed (highest count first)
                filteredResults.sort((a, b) => b.count - a.count);
            } else {
                // Sort by most recent (based on the order in the distinct array)
                filteredResults = filteredResults.sort((a, b) => {
                    return distinct.indexOf(a.name) - distinct.indexOf(b.name);
                });
            }

            // Re-display the table with the updated sorted data
            displayTable(currentPage, filteredResults);
        }

        // Filter search results based on input
        function search() {
            const query = document.getElementById("searchbar").value.toLowerCase();
            filteredResults = searchResults.filter(item => item.name.toLowerCase().includes(query));
            displayTable(currentPage, filteredResults);
        }

        // Initial Display: Default to most recent order (no sorting)
        displayTable(currentPage, filteredResults);
    </script>
</body>
</html>
